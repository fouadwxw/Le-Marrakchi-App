services:
  - type: web
    name: le-marrakechi-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: le_marrakechi
      - key: JWT_SECRET
        sync: false
      - key: EMERGENT_LLM_KEY
        sync: false
